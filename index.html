<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>💧 WaterSupply Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#060E1C;--surface:#0B1829;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--cyan:#22D3EE;--amber:#FBBF24;--green:#4ADE80;--red:#F87171;--wa:#25D366;--text:#E2F0FB;--sub:#6A96B8;--muted:#314E68;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;color:var(--text);overscroll-behavior:none;}
input,select,button,textarea{font-family:'DM Sans',sans-serif;}
input,select,textarea{-webkit-user-select:text!important;user-select:text!important;touch-action:manipulation;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--cyan)!important;outline-offset:-1px;}
input[type=date]::-webkit-calendar-picker-indicator,input[type=month]::-webkit-calendar-picker-indicator{filter:invert(0.6);}
select option{background:#0B1829;color:#E2F0FB;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#1E3A5F;border-radius:2px;}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.su{animation:slideUp 0.28s cubic-bezier(.22,.68,0,1.2) forwards;}
.fi{animation:fadeIn 0.2s ease forwards;}
.spin{animation:spin 0.8s linear infinite;}
.sheet{background:var(--surface);border-radius:22px 22px 0 0;padding:0 0 44px;width:100%;max-width:480px;border:1px solid var(--border);border-bottom:none;max-height:94vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sheet-handle{width:38px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:14px auto 0;}
.sheet-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 0;}
.sheet-body{padding:0 20px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--sub);margin-bottom:8px;}
.finput{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:13px;padding:16px 15px;color:var(--text);font-size:16px;display:block;-webkit-appearance:none;appearance:none;transition:border-color .15s;}
.finput:focus{border-color:var(--cyan)!important;outline:none!important;background:rgba(34,211,238,0.06);}
.btn{border:none;border-radius:13px;padding:15px 20px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
.btn:active{transform:scale(0.97);opacity:0.85;}
.card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:15px 16px;}
.badge{display:inline-flex;align-items:center;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;}
.loader-ring{width:48px;height:48px;border:3px solid rgba(34,211,238,0.2);border-top-color:#22D3EE;border-radius:50%;}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useCallback} = React;

/* ══ SUPABASE CONFIG ══ */
const SUPA_URL = 'https://aqroensjwnqhbaugpdno.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxcm9lbnNqd25xaGJhdWdwZG5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDAwMjksImV4cCI6MjA4ODk3NjAyOX0.EilDKmLtoH775k_XunBpshXaoOaN4F-jhIO1cBoMjwA';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

/* ══ HELPERS ══ */
const todayStr = new Date().toISOString().split('T')[0];
const monthStr = new Date().toISOString().slice(0,7);
const mc = {Cash:'#4ADE80',UPI:'#22D3EE',Online:'#FBBF24'};
const fmtDate  = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : '';
const fmtMonth = m => new Date(m+'-01').toLocaleDateString('en-IN',{month:'long',year:'numeric'});
let _uid=100; const uid=()=>++_uid;

function App() {
  /* ══ DATA STATE ══ */
  const [custs,  setCusts]  = useState([]);
  const [dels,   setDels]   = useState([]);
  const [pays,   setPays]   = useState([]);
  const [qrImg,  setQrImg]  = useState('');
  const [upiId,  setUpiId]  = useState('');
  const [loading,setLoading]= useState(true);
  const [syncing,setSyncing]= useState(false);

  /* ══ UI STATE ══ */
  const [page,   setPage]   = useState('dashboard');
  const [modal,  setModal]  = useState(null);
  const [search, setSearch] = useState('');
  const [month,  setMonth]  = useState(monthStr);
  const [toast,  setToast]  = useState(null);
  const [waModal,setWaModal]= useState(null);
  const [qrView, setQrView] = useState(false);

  /* ══ FORM STATE — top level prevents keyboard close ══ */
  const [cId,    setCId]   = useState(null);
  const [cName,  setCName] = useState('');
  const [cPhone, setCPhone]= useState('');
  const [cAddr,  setCAddr] = useState('');
  const [cPrice, setCPrice]= useState('35');
  const [cAct,   setCAt]   = useState(true);
  const [dId,    setDId]   = useState(null);
  const [dCust,  setDCust] = useState('');
  const [dCans,  setDCans] = useState('1');
  const [dDate,  setDDate] = useState(todayStr);
  const [pCust,  setPCust] = useState('');
  const [pAmt,   setPAmt]  = useState('');
  const [pDate,  setPDate] = useState(todayStr);
  const [pMeth,  setPMeth] = useState('Cash');

  const toast_ = (msg,color='#4ADE80') => {setToast({msg,color});setTimeout(()=>setToast(null),2500);};

  /* ══ LOAD ALL DATA ══ */
  const loadAll = async () => {
    setLoading(true);
    try {
      const [c,d,p,s] = await Promise.all([
        sb.from('customers').select('*').order('name'),
        sb.from('deliveries').select('*').order('date',{ascending:false}),
        sb.from('payments').select('*').order('date',{ascending:false}),
        sb.from('settings').select('*'),
      ]);
      if(c.data) setCusts(c.data);
      if(d.data) setDels(d.data);
      if(p.data) setPays(p.data);
      if(s.data){
        const qr  = s.data.find(x=>x.key==='qr_b64');
        const upi = s.data.find(x=>x.key==='upi_id');
        if(qr)  setQrImg(qr.value);
        if(upi) setUpiId(upi.value);
      }
    } catch(e) { toast_('Connection error. Try again.','#F87171'); }
    setLoading(false);
  };

  useEffect(()=>{ loadAll(); },[]);

  /* ══ STATS ══ */
  const stats = useMemo(()=>{
    const m={};
    custs.forEach(c=>{m[c.id]={cans:0,amount:0,paid:0};});
    dels.forEach(d=>{if(m[d.customer_id]){m[d.customer_id].cans+=d.cans;m[d.customer_id].amount+=Number(d.amount);}});
    pays.forEach(p=>{if(m[p.customer_id]) m[p.customer_id].paid+=Number(p.amount);});
    Object.keys(m).forEach(id=>{m[id].pending=m[id].amount-m[id].paid;});
    return m;
  },[custs,dels,pays]);

  const dash = useMemo(()=>{
    const td=dels.filter(d=>d.date===todayStr);
    return {
      active:custs.filter(c=>c.active).length,
      todayCans:td.reduce((s,d)=>s+d.cans,0),
      todayTrips:td.length,
      todayIncome:td.reduce((s,d)=>s+Number(d.amount),0),
      totalPending:Object.values(stats).reduce((s,st)=>s+Math.max(0,st.pending),0),
    };
  },[custs,dels,stats]);

  const pendingCusts = custs.filter(c=>(stats[c.id]?.pending||0)>0);
  const filtered = useMemo(()=>custs.filter(c=>
    c.name.toLowerCase().includes(search.toLowerCase())||c.phone.includes(search)
  ),[custs,search]);

  const monthData = useMemo(()=>{
    const [yr,mo]=month.split('-');
    return custs.map(c=>{
      const md=dels.filter(d=>d.customer_id===c.id&&d.date?.startsWith(`${yr}-${mo}`));
      const mp=pays.filter(p=>p.customer_id===c.id&&p.date?.startsWith(`${yr}-${mo}`));
      const amt=md.reduce((s,d)=>s+Number(d.amount),0);
      const paid=mp.reduce((s,p)=>s+Number(p.amount),0);
      return {c,cans:md.reduce((s,d)=>s+d.cans,0),amt,paid,pending:amt-paid};
    }).filter(r=>r.cans>0||r.paid>0);
  },[custs,dels,pays,month]);

  /* ══ CUSTOMER ACTIONS ══ */
  const openAddCust=()=>{setCId(null);setCName('');setCPhone('');setCAddr('');setCPrice('35');setCAt(true);setModal('cust');};
  const openEditCust=c=>{setCId(c.id);setCName(c.name);setCPhone(c.phone);setCAddr(c.address||'');setCPrice(String(c.price_per_can));setCAt(c.active);setModal('cust');};

  const saveCust=async()=>{
    if(!cName.trim()||!cPhone.trim()){toast_('பெயர் & Phone கட்டாயம்','#FBBF24');return;}
    setSyncing(true);
    const data={name:cName,phone:cPhone,address:cAddr,price_per_can:+cPrice,active:cAct};
    if(cId){
      const {data:r}=await sb.from('customers').update(data).eq('id',cId).select().single();
      if(r) setCusts(p=>p.map(c=>c.id===cId?r:c));
      toast_('Customer updated ✓');
    } else {
      const {data:r}=await sb.from('customers').insert(data).select().single();
      if(r) setCusts(p=>[...p,r].sort((a,b)=>a.name.localeCompare(b.name)));
      toast_('Customer added ✓');
    }
    setSyncing(false); setModal(null);
  };

  const toggleActive=async(c)=>{
    const {data:r}=await sb.from('customers').update({active:!c.active}).eq('id',c.id).select().single();
    if(r) setCusts(p=>p.map(x=>x.id===c.id?r:x));
  };

  /* ══ DELIVERY ACTIONS ══ */
  const openAddDel=()=>{setDId(null);setDCust('');setDCans('1');setDDate(todayStr);setModal('del');};
  const openEditDel=d=>{setDId(d.id);setDCust(String(d.customer_id));setDCans(String(d.cans));setDDate(d.date);setModal('del');};

  const saveDel=async()=>{
    if(!dCust||!dCans){toast_('எல்லாம் fill பண்ணுங்க','#FBBF24');return;}
    const cust=custs.find(c=>c.id===+dCust);
    const amount=cust.price_per_can*+dCans;
    const time=new Date().toTimeString().slice(0,5);
    setSyncing(true);
    if(dId){
      const {data:r}=await sb.from('deliveries').update({customer_id:+dCust,cans:+dCans,amount,date:dDate}).eq('id',dId).select().single();
      if(r) setDels(p=>p.map(d=>d.id===dId?r:d));
      toast_(`Delivery updated ₹${amount} ✓`);
    } else {
      const {data:r}=await sb.from('deliveries').insert({customer_id:+dCust,cans:+dCans,amount,date:dDate,time}).select().single();
      if(r) setDels(p=>[r,...p]);
      toast_(`Delivery saved ₹${amount} ✓`);
    }
    setSyncing(false); setModal(null);
  };

  const delDelivery=async(id)=>{
    await sb.from('deliveries').delete().eq('id',id);
    setDels(p=>p.filter(d=>d.id!==id));
    toast_('Deleted ✓','#F87171');
  };

  /* ══ PAYMENT ACTIONS ══ */
  const savePay=async()=>{
    if(!pCust||!pAmt){toast_('எல்லாம் fill பண்ணுங்க','#FBBF24');return;}
    setSyncing(true);
    const {data:r}=await sb.from('payments').insert({customer_id:+pCust,amount:+pAmt,date:pDate,method:pMeth}).select().single();
    if(r) setPays(p=>[r,...p]);
    setSyncing(false); setModal(null);
    toast_(`Payment ₹${pAmt} saved ✓`);
  };

  /* ══ WHATSAPP ══ */
  const openWA=c=>{ const s=stats[c.id]; setWaModal({cust:c,pending:s.pending,billed:s.amount,paid:s.paid}); };

  const sendWA=async()=>{
    if(!waModal) return;
    const {cust,pending,billed,paid}=waModal;
    const upiLine=upiId?`\n💳 UPI ID: *${upiId}*`:'';
    const qrLine=qrImg?`\n📷 QR Code உடனே அனுப்புகிறேன் 👇`:'';
    const msg=`Hello ${cust.name}! 👋\n\n📋 *Water Can Supply Bill*\n━━━━━━━━━━━━━━━\n🪣 Total Billed : ₹${billed}\n✅ Total Paid   : ₹${paid}\n⏳ *Balance Due  : ₹${pending}*\n━━━━━━━━━━━━━━━${upiLine}${qrLine}\n\nPlease make the payment.\nThank you! 🙏`;
    const ph=cust.phone.replace(/\D/g,'');
    window.open(`https://wa.me/91${ph}?text=${encodeURIComponent(msg)}`,'_blank');
    if(qrImg){
      setTimeout(async()=>{
        try{
          const res=await fetch(qrImg); const blob=await res.blob();
          const file=new File([blob],'payment_qr.png',{type:'image/png'});
          if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
            await navigator.share({title:`QR — ${cust.name}`,files:[file]});
          } else { const a=document.createElement('a');a.href=qrImg;a.download='payment_qr.png';a.click(); toast_('QR downloaded! WhatsApp-ல send பண்ணுங்க 📤','#22D3EE'); }
        }catch(e){setQrView(true);}
      },1200);
    }
  };

  /* ══ QR UPLOAD ══ */
  const handleQR=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const b64=ev.target.result;
      setQrImg(b64);
      await sb.from('settings').upsert({key:'qr_b64',value:b64});
      toast_('QR Code uploaded ✓');
    };
    reader.readAsDataURL(file);
  };

  const saveUpi=async()=>{
    await sb.from('settings').upsert({key:'upi_id',value:upiId});
    toast_('UPI ID saved ✓');
  };

  /* ══ CSV EXPORT ══ */
  const exportCSV=()=>{
    const rows=custs.map(c=>{const s=stats[c.id]||{};return`"${c.name}","${c.phone}","${c.address||''}",${c.price_per_can},${s.cans||0},${s.amount||0},${s.paid||0},${s.pending||0}`;});
    const blob=new Blob([['Name,Phone,Address,Price/Can,Cans,Amount,Paid,Pending',...rows].join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`water_report_${todayStr}.csv`;a.click();
    toast_('CSV exported ✓');
  };

  /* ══════════════════════════
     MODAL ELEMENTS
  ══════════════════════════ */
  const closeBtn=(
    <button onClick={()=>setModal(null)} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:24,width:44,height:44,fontSize:22,cursor:'pointer',color:'#E2F0FB',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>✕</button>
  );

  /* Customer Modal */
  const custModal = modal==='cust'&&(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:200,backdropFilter:'blur(6px)'}}>
      <div className="su sheet">
        <div className="sheet-handle"/>
        <div className="sheet-head"><span style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800}}>{cId?'✏️ Edit Customer':'➕ New Customer'}</span>{closeBtn}</div>
        <div className="sheet-body" style={{marginTop:20}}>
          <div className="field"><label>Customer Name</label><input className="finput" value={cName} onChange={e=>setCName(e.target.value)} placeholder="e.g. Rajesh Kumar"/></div>
          <div className="field"><label>Phone Number</label><input className="finput" type="tel" value={cPhone} onChange={e=>setCPhone(e.target.value)} placeholder="10-digit number"/></div>
          <div className="field"><label>Address</label><input className="finput" value={cAddr} onChange={e=>setCAddr(e.target.value)} placeholder="Street, Area, City"/></div>
          <div className="field"><label>Price per 20L Can (₹)</label><input className="finput" type="number" min="1" value={cPrice} onChange={e=>setCPrice(e.target.value)}/></div>
          <div className="field"><label>Status</label>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setCAt(true)}  className="btn" style={{flex:1,background:cAct?'rgba(74,222,128,0.15)':'rgba(255,255,255,0.05)',color:cAct?'#4ADE80':'#6A96B8',border:`1.5px solid ${cAct?'rgba(74,222,128,0.4)':'rgba(255,255,255,0.1)'}`}}>✅ Active</button>
              <button onClick={()=>setCAt(false)} className="btn" style={{flex:1,background:!cAct?'rgba(248,113,113,0.15)':'rgba(255,255,255,0.05)',color:!cAct?'#F87171':'#6A96B8',border:`1.5px solid ${!cAct?'rgba(248,113,113,0.4)':'rgba(255,255,255,0.1)'}`}}>❌ Inactive</button>
            </div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:4}}>
            <button className="btn" onClick={()=>setModal(null)} style={{flex:1,background:'rgba(255,255,255,0.07)',color:'#E2F0FB'}}>Cancel</button>
            <button className="btn" onClick={saveCust} disabled={syncing} style={{flex:2,background:'#22D3EE',color:'#060E1C',opacity:syncing?0.7:1}}>{syncing?'Saving...':cId?'💾 Save Changes':'➕ Add Customer'}</button>
          </div>
        </div>
      </div>
    </div>
  );

  /* Delivery Modal */
  const selCDel=custs.find(c=>c.id===+dCust);
  const calcAmt=selCDel?selCDel.price_per_can*(+dCans||0):0;
  const delModal = modal==='del'&&(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:200,backdropFilter:'blur(6px)'}}>
      <div className="su sheet">
        <div className="sheet-handle"/>
        <div className="sheet-head"><span style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800}}>{dId?'✏️ Edit Delivery':'🚚 Add Delivery'}</span>{closeBtn}</div>
        <div className="sheet-body" style={{marginTop:20}}>
          <div className="field"><label>Select Customer</label>
            <select className="finput" value={dCust} onChange={e=>setDCust(e.target.value)}>
              <option value="">— Select Customer —</option>
              {custs.filter(c=>c.active).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div className="field"><label>Cans</label><input className="finput" type="number" min="1" value={dCans} onChange={e=>setDCans(e.target.value)}/></div>
            <div className="field"><label>Date</label><input className="finput" type="date" value={dDate} onChange={e=>setDDate(e.target.value)}/></div>
          </div>
          {selCDel&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'rgba(34,211,238,0.1)',border:'1px solid rgba(34,211,238,0.25)',borderRadius:13,padding:'14px 18px',marginBottom:16}}>
            <div><div style={{fontSize:13,color:'#6A96B8'}}>Auto-calculated</div><div style={{fontSize:12,color:'#314E68',marginTop:2}}>{dCans} × ₹{selCDel.price_per_can}</div></div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:30,color:'#22D3EE'}}>₹{calcAmt}</div>
          </div>}
          <div style={{display:'flex',gap:10}}>
            <button className="btn" onClick={()=>setModal(null)} style={{flex:1,background:'rgba(255,255,255,0.07)',color:'#E2F0FB'}}>Cancel</button>
            <button className="btn" onClick={saveDel} disabled={syncing} style={{flex:2,background:'#22D3EE',color:'#060E1C',opacity:syncing?0.7:1}}>{syncing?'Saving...':`💾 ${dId?'Update':'Save'} Delivery`}</button>
          </div>
        </div>
      </div>
    </div>
  );

  /* Payment Modal */
  const selCPay=custs.find(c=>c.id===+pCust);
  const custPend=selCPay?(stats[selCPay.id]?.pending||0):0;
  const payModal = modal==='pay'&&(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:200,backdropFilter:'blur(6px)'}}>
      <div className="su sheet">
        <div className="sheet-handle"/>
        <div className="sheet-head"><span style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800}}>💳 Record Payment</span>{closeBtn}</div>
        <div className="sheet-body" style={{marginTop:20}}>
          <div className="field"><label>Select Customer</label>
            <select className="finput" value={pCust} onChange={e=>setPCust(e.target.value)}>
              <option value="">— Select Customer —</option>

              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn" onClick={()=>openWA(c)} style={{flex:1,background:'#25D366',color:'#fff',padding:12,fontSize:12}}>📱 WhatsApp</button>
                <button className="btn" onClick={()=>{setPCust(String(c.id));setPAmt('');setPDate(todayStr);setPMeth('Cash');setModal('pay');}} style={{background:'rgba(74,222,128,0.12)',color:'#4ADE80',padding:'12px 16px',fontSize:12}}>💳 Pay</button>
              </div>
            </div>
          );
        })
      }
    </div>
  );

  /* REPORTS */
  const mt={cans:monthData.reduce((s,r)=>s+r.cans,0),amt:monthData.reduce((s,r)=>s+r.amt,0),paid:monthData.reduce((s,r)=>s+r.paid,0),pend:monthData.reduce((s,r)=>s+r.pending,0)};
  const pgRep=(
    <div className="su" style={{padding:'20px 16px 10px'}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,marginBottom:16}}>Reports</div>
      <button className="btn" onClick={exportCSV} style={{width:'100%',background:'rgba(255,255,255,0.05)',color:'#E2F0FB',border:'1px solid rgba(255,255,255,0.08)',padding:15,borderRadius:13,marginBottom:16,fontSize:14}}>📊 Export as CSV</button>
      <div className="field" style={{marginBottom:16}}><label>Monthly Period</label><input className="finput" type="month" value={month} onChange={e=>setMonth(e.target.value)}/></div>
      <div className="card" style={{marginBottom:16,background:'rgba(34,211,238,0.07)',borderColor:'rgba(34,211,238,0.2)'}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:700,color:'#22D3EE',marginBottom:12}}>{fmtMonth(month)} — Summary</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,textAlign:'center'}}>
          {[{l:'Custs',v:monthData.length,c:'#22D3EE'},{l:'Cans',v:mt.cans,c:'#22D3EE'},{l:'Billed',v:`₹${mt.amt}`,c:'#E2F0FB'},{l:'Pending',v:`₹${mt.pend}`,c:mt.pend>0?'#FBBF24':'#4ADE80'}].map((s,i)=>(
            <div key={i}><div style={{fontFamily:"'DM Mono',monospace",fontSize:14,color:s.c}}>{s.v}</div><div style={{fontSize:10,color:'#6A96B8',marginTop:3}}>{s.l}</div></div>
          ))}
        </div>
      </div>
      {monthData.length===0?<div style={{color:'#314E68',textAlign:'center',padding:'30px 0'}}>No data for {fmtMonth(month)}</div>
        :monthData.map((r,i)=>(
          <div key={i} className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15}}>{r.c.name}</div><div style={{fontSize:12,color:'#6A96B8'}}>{r.cans} cans × ₹{r.c.price_per_can}</div></div>
              <div style={{textAlign:'right'}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:18,color:r.pending>0?'#FBBF24':'#4ADE80'}}>₹{r.pending}</div><div style={{fontSize:10,color:'#6A96B8'}}>{r.pending>0?'pending':'cleared'}</div></div>
            </div>
            {r.pending>0&&<button className="btn" onClick={()=>openWA(r.c)} style={{width:'100%',background:'#25D366',color:'#fff',padding:10,fontSize:12}}>📱 WhatsApp — {r.c.name}</button>}
          </div>
        ))
      }
    </div>
  );

  /* SETTINGS */
  const pgSettings=(
    <div className="su" style={{padding:'20px 16px 10px'}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,marginBottom:20}}>⚙️ Settings</div>
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:700,marginBottom:14}}>📷 UPI QR Code</div>
        {qrImg?<div style={{textAlign:'center',marginBottom:14}}>
          <img src={qrImg} alt="QR" style={{width:150,height:150,borderRadius:12,border:'2px solid rgba(34,211,238,0.4)',background:'white',padding:6,objectFit:'contain'}}/>
          <div style={{fontSize:12,color:'#4ADE80',marginTop:8}}>✅ QR uploaded & saved to cloud</div>
        </div>:<div style={{background:'rgba(255,255,255,0.03)',borderRadius:12,padding:24,textAlign:'center',border:'2px dashed rgba(255,255,255,0.1)',marginBottom:14}}>
          <div style={{fontSize:40,marginBottom:8}}>📷</div>
          <div style={{fontSize:13,color:'#6A96B8'}}>Upload UPI QR Code</div>
        </div>}
        <label style={{display:'block'}}>
          <input type="file" accept="image/*" onChange={handleQR} style={{display:'none'}}/>
          <div className="btn" style={{width:'100%',background:'rgba(34,211,238,0.12)',color:'#22D3EE',border:'1px solid rgba(34,211,238,0.3)',cursor:'pointer',padding:13,justifyContent:'center'}}>
            {qrImg?'🔄 Change QR':'📤 Upload QR'}
          </div>
        </label>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:700,marginBottom:14}}>💳 UPI ID</div>
        <div className="field"><label>Your UPI ID</label><input className="finput" value={upiId} onChange={e=>setUpiId(e.target.value)} placeholder="yourname@upi"/></div>
        <button className="btn" onClick={saveUpi} style={{width:'100%',background:'rgba(74,222,128,0.12)',color:'#4ADE80',border:'1px solid rgba(74,222,128,0.3)',padding:13}}>💾 Save UPI ID to Cloud</button>
      </div>
      <div className="card" style={{borderColor:'rgba(34,211,238,0.2)'}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700,color:'#22D3EE',marginBottom:8}}>☁️ Cloud Database</div>
        <div style={{fontSize:13,color:'#6A96B8',marginBottom:4}}>Customers: <strong style={{color:'#E2F0FB'}}>{custs.length}</strong></div>
        <div style={{fontSize:13,color:'#6A96B8',marginBottom:4}}>Deliveries: <strong style={{color:'#E2F0FB'}}>{dels.length}</strong></div>
        <div style={{fontSize:13,color:'#6A96B8',marginBottom:12}}>Payments: <strong style={{color:'#E2F0FB'}}>{pays.length}</strong></div>
        <button className="btn" onClick={loadAll} style={{width:'100%',background:'rgba(34,211,238,0.1)',color:'#22D3EE',border:'1px solid rgba(34,211,238,0.3)',padding:12,fontSize:13}}>🔄 Refresh Data</button>
      </div>
    </div>
  );

  /* ══ BOTTOM NAV ══ */
  const nav=[
    {id:'dashboard', icon:'🏠',label:'Home'},
    {id:'customers', icon:'👥',label:'Customers'},
    {id:'deliveries',icon:'🚚',label:'Deliveries'},
    {id:'payments',  icon:'💳',label:'Payments'},
    {id:'pending',   icon:'⏳',label:'Pending'},
    {id:'reports',   icon:'📊',label:'Reports'},
    {id:'settings',  icon:'⚙️', label:'Settings'},
  ];

  return(
    <div style={{background:'#060E1C',minHeight:'100vh',fontFamily:"'DM Sans',sans-serif",color:'#E2F0FB',paddingBottom:76}}>
      <div style={{maxWidth:480,margin:'0 auto'}}>
        {page==='dashboard'  && pgDash}
        {page==='customers'  && pgCusts}
        {page==='deliveries' && pgDels}
        {page==='payments'   && pgPays}
        {page==='pending'    && pgPend}
        {page==='reports'    && pgRep}
        {page==='settings'   && pgSettings}
      </div>

      {/* Bottom Nav */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#0B1829',borderTop:'1px solid rgba(255,255,255,0.07)',zIndex:100}}>
        <div style={{maxWidth:480,margin:'0 auto',display:'flex',padding:'7px 0 11px'}}>
          {nav.map(item=>{
            const active=page===item.id;
            const badge=item.id==='pending'&&pendingCusts.length>0;
            return(
              <button key={item.id} onClick={()=>setPage(item.id)} style={{background:'none',border:'none',cursor:'pointer',flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 2px',position:'relative'}}>
                <span style={{fontSize:active?21:18,transition:'transform .15s',transform:active?'scale(1.15)':'scale(1)',filter:active?'none':'opacity(0.4)'}}>{item.icon}</span>
                <span style={{fontSize:8,fontWeight:active?700:500,color:active?'#22D3EE':'#314E68'}}>{item.label}</span>
                {badge&&<span style={{position:'absolute',top:0,right:'50%',transform:'translateX(12px)',background:'#FBBF24',color:'#060E1C',width:15,height:15,borderRadius:8,fontSize:9,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>{pendingCusts.length}</span>}
                {active&&<div style={{position:'absolute',bottom:-2,width:20,height:2.5,background:'#22D3EE',borderRadius:2,left:'50%',transform:'translateX(-50%)'}}/>}
              </button>
            );
          })}
        </div>
      </div>

      {custModal}{delModal}{payModal}{waEl}{qrEl}

      {toast&&<div className="fi" style={{position:'fixed',top:24,left:'50%',transform:'translateX(-50%)',background:toast.color,color:'#060E1C',borderRadius:12,padding:'12px 22px',fontSize:14,fontWeight:700,zIndex:400,whiteSpace:'nowrap',boxShadow:'0 6px 30px rgba(0,0,0,0.6)'}}>{toast.msg}</div>}
      {syncing&&<div style={{position:'fixed',bottom:90,right:16,background:'rgba(34,211,238,0.2)',borderRadius:20,padding:'6px 12px',fontSize:12,color:'#22D3EE',border:'1px solid rgba(34,211,238,0.3)',zIndex:99}}>☁️ Saving...</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
